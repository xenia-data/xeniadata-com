  is_gate: !!q.g,
  field_id: q.f || null,
  help: q.h || '',
  needs_followup: !!q.fu,
}));

const STORE_KEY = 'xenia_interview_v5';
let state = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
state.property = state.property || null;
state.answers = state.answers || {};
state.frictions = state.frictions || {};
state.typed_details = state.typed_details || {};
state.history = state.history || [];
state.startedAt = state.startedAt || null;
state.times = state.times || {};
state.skippedDueToParent = state.skippedDueToParent || [];
let qStartTime = null;
let currentQid = null;
let detailOpen = false;

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function shouldShow(q) {
  if (!q.parent) return true;
  return state.answers[q.parent] === 'yes';
}
function findNextQid() {
  for (let i = 0; i < Q.length; i++) {
    const q = Q[i];
    if (state.answers[q.id] !== undefined) continue;
    if (!shouldShow(q)) {
      if (!state.skippedDueToParent.includes(q.id)) state.skippedDueToParent.push(q.id);
      continue;
    }
    return q.id;
  }
  return null;
}
function countAnswered() {
  return Object.keys(state.answers).filter(k => state.answers[k] !== '__SKIP__').length;
}
function countRemaining() {
  let n = 0;
  for (const q of Q) {
    if (state.answers[q.id] !== undefined) continue;
    if (!shouldShow(q)) continue;
    n++;
  }
  return n;
}

const root = document.getElementById('root');

function showWelcome() {
  root.innerHTML = `
    <div class="welcome-card">
      <h3>Xenia interview — v5 (unambiguous wording)</h3>
      <p><strong>${Q.length} questions</strong> auto-generated from your 1,835-field register, with every question scoped so its meaning is unambiguous.</p>
      <p><strong>One tap = answer + auto-advance.</strong> Saying NO to a section gate collapses that whole section.</p>
      <p><strong>Three controls per question:</strong></p>
      <p style="margin-left:12px;font-size:14px;">
        ← <strong>Back</strong> button (top left) — undo last answer<br>
        <strong>?</strong> button (top right) — explains exactly what the question is asking + shows the underlying field definition<br>
        <strong>✎</strong> button (top right) — drop a friction note so Claude can fix the wording
      </p>
      <p style="margin-left:12px;font-size:14px;">Optional <strong>"+ Add detail"</strong> button under Yes/No — opens a typing area for nuance only when you need it.</p>
    </div>
    <div class="welcome-card">
      <h3>Pick a property</h3>
      <button onclick="startInterview('Sessions Retreat')">Sessions Retreat (36 rooms)</button>
      <button onclick="startInterview('The Burgundy')">The Burgundy (55 rooms)</button>
      ${countAnswered() > 0 ? `<button class="secondary" onclick="resumeInterview()">Resume (${countAnswered()} answered)</button>` : ''}
    </div>
  `;
}

function startInterview(property) {
  state = { property, answers:{}, frictions:{}, typed_details:{}, history:[], startedAt:new Date().toISOString(), times:{}, skippedDueToParent:[] };
  save();
  showCurrentQuestion();
}
function resumeInterview() { showCurrentQuestion(); }

function showCurrentQuestion() {
  const nextId = findNextQid();
  if (!nextId) return showDone();
  currentQid = nextId;
  qStartTime = Date.now();
  detailOpen = false;
  const q = Q.find(x => x.id === currentQid);

  const answered = countAnswered();
  const remaining = countRemaining();
  const total = answered + remaining;
  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;

  const hasNote = !!state.frictions[q.id];
  const hasDetail = !!state.typed_details[q.id];

  root.innerHTML = `
    <div class="topbar">
      <button class="back-btn" onclick="goBack()" ${state.history.length === 0 ? 'disabled' : ''}>
        <span class="arr">←</span><span>Back</span>
      </button>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <button class="icon-btn help" onclick="openHelp()">?</button>
      <button class="icon-btn note ${hasNote ? 'has-note' : ''}" onclick="openNote()">✎</button>
    </div>
    <span class="section-tag">${q.section}${q.is_gate ? '<span class="gate-flag">SECTION GATE</span>' : ''}</span>
    <div class="qcount">${answered + 1} of ~${total}${q.field_id ? ` · field #${q.field_id}` : ''}</div>
    <h2 class="question">${q.text}</h2>
    ${q.needs_followup ? `<div class="followup-note">YES here just flags this — the exact value/type is captured in a later pass.</div>` : ''}
    <div class="answer-zone">
      <button class="ans-btn yes" onclick="answer('yes')"><span class="icon">✓</span><span>YES</span></button>
      <button class="ans-btn" onclick="answer('no')"><span class="icon">✗</span><span>NO</span></button>
      <button class="ans-btn idk" onclick="answer('__SKIP__')">Not sure — skip this one</button>
    </div>
    <button class="detail-toggle" onclick="toggleDetail()">Add detail (optional)${hasDetail ? '<span class="detail-saved-pill">SAVED</span>' : ''}</button>
    <div class="detail-box" id="detailBox">
      <textarea id="detailText" placeholder="Add nuance: caveats, exceptions, partial-yes situations, anything yes/no cannot capture.">${state.typed_details[q.id] || ''}</textarea>
      <div class="detail-actions">
        <button onclick="discardDetail()">Discard</button>
        <button class="primary" onclick="saveDetail()">Save detail</button>
      </div>
    </div>
  `;
}

function toggleDetail() {
  detailOpen = !detailOpen;
  const box = document.getElementById('detailBox');
  if (detailOpen) {
    box.classList.add('open');
    setTimeout(() => document.getElementById('detailText').focus(), 60);
  } else {
    box.classList.remove('open');
  }
}
function saveDetail() {
  const txt = document.getElementById('detailText').value.trim();
  if (txt) state.typed_details[currentQid] = txt;
  else delete state.typed_details[currentQid];
  save();
  detailOpen = false;
  showCurrentQuestion();
}
function discardDetail() {
  delete state.typed_details[currentQid];
  save();
  detailOpen = false;
  showCurrentQuestion();
}

function answer(val) {
  if (qStartTime) state.times[currentQid] = Math.round((Date.now() - qStartTime) / 1000);
  state.history.push(currentQid);
  state.answers[currentQid] = val;
  save();
  showCurrentQuestion();
}

function goBack() {
  if (state.history.length === 0) return;
  const last = state.history.pop();
  delete state.answers[last];
  delete state.times[last];
  save();
  showCurrentQuestion();
}

function openHelp() {
  const q = Q.find(x => x.id === currentQid);
  document.getElementById('helpTitle').textContent = 'What this question means';
  document.getElementById('helpBody').textContent = q.help || 'No additional context. Answer based on your best understanding.';
  document.getElementById('helpModal').classList.add('open');
}
function closeHelp() { document.getElementById('helpModal').classList.remove('open'); }
function openNote() {
  document.getElementById('noteText').value = state.frictions[currentQid] || '';
  document.getElementById('noteModal').classList.add('open');
  setTimeout(() => document.getElementById('noteText').focus(), 60);
}
function closeNote() { document.getElementById('noteModal').classList.remove('open'); }
function saveNote() {
  const txt = document.getElementById('noteText').value.trim();
  if (txt) state.frictions[currentQid] = txt;
  else delete state.frictions[currentQid];
  save();
  closeNote();
  showCurrentQuestion();
}

function showDone() {
  const answered = countAnswered();
  const yesCount = Object.values(state.answers).filter(v => v === 'yes').length;
  const noCount = Object.values(state.answers).filter(v => v === 'no').length;
  const skippedCount = Object.values(state.answers).filter(v => v === '__SKIP__').length;
  const autoSkipped = state.skippedDueToParent.length;
  const frictionCount = Object.keys(state.frictions).length;
  const detailCount = Object.keys(state.typed_details).length;
  const totalSec = Object.values(state.times).reduce((a,b) => a+b, 0);
  const avg = answered > 0 ? (totalSec / answered).toFixed(1) : 0;
  const fieldsCovered = yesCount + noCount + autoSkipped;

  root.innerHTML = `
    <div class="done-card">
      <h3>Done — ${state.property}</h3>
      <div class="done-stat">${fieldsCovered} fields informed</div>
      <p style="font-size:14px;color:#555;">${yesCount} yes · ${noCount} no · ${autoSkipped} auto-skipped (parent NO) · ${skippedCount} skipped · ${frictionCount} friction notes · ${detailCount} typed details</p>
      <p style="font-size:14px;color:#555;">${Math.floor(totalSec/60)}m ${totalSec%60}s total · ${avg}s avg per question</p>
    </div>
    <div class="welcome-card">
      <h3>Send to Claude</h3>
      <p style="font-size:14px;">Tap to copy. Paste back into Claude chat.</p>
      <button onclick="copyDiagnostic()">📋 Copy diagnostic</button>
      <button class="secondary" onclick="showInline()">See report inline</button>
    </div>
    <div id="inlineDiag"></div>
    <div class="welcome-card">
      <h3>Start fresh?</h3>
      <button class="secondary" onclick="reset()">Reset everything</button>
    </div>
  `;
}

function reset() {
  if (confirm('Erase all answers and start over?')) { localStorage.removeItem(STORE_KEY); location.reload(); }
}

function buildDiagnostic() {
  let out = '';
  out += `XENIA INTERVIEW v5 DIAGNOSTIC\n`;
  out += `==============================\n`;
  out += `Property: ${state.property}\n`;
  out += `Started: ${state.startedAt}\nEnded: ${new Date().toISOString()}\n`;
  const totalSec = Object.values(state.times).reduce((a,b) => a+b, 0);
  const yes = Object.values(state.answers).filter(v=>v==='yes').length;
  const no = Object.values(state.answers).filter(v=>v==='no').length;
  out += `Total: ${Math.floor(totalSec/60)}m ${totalSec%60}s · Tapped: ${countAnswered()} · Yes: ${yes} · No: ${no} · Auto-skipped: ${state.skippedDueToParent.length}\n`;

  const bySection = {};
  for (const q of Q) {
    if (state.answers[q.id] === undefined) continue;
    bySection[q.section] = bySection[q.section] || [];
    bySection[q.section].push(q);
  }
  for (const sec of Object.keys(bySection).sort()) {
    out += `\n=== ${sec} ===\n`;
    for (const q of bySection[sec]) {
      const t = state.times[q.id] || '?';
      const fid = q.field_id ? `[#${q.field_id}]` : '[GATE]';
      out += `  ${fid} (${t}s): ${q.text} → ${state.answers[q.id]}\n`;
      if (state.typed_details[q.id]) out += `    DETAIL: ${state.typed_details[q.id]}\n`;
      if (state.frictions[q.id]) out += `    FRICTION: ${state.frictions[q.id]}\n`;
    }
  }
  if (state.skippedDueToParent.length) {
    out += `\n=== AUTO-SKIPPED (parent gate NO) ===\n`;
    for (const qid of state.skippedDueToParent) {
      const q = Q.find(x => x.id === qid);
      if (q && q.field_id) out += `  [#${q.field_id}] ${q.section}: ${q.text}\n`;
    }
  }
  out += `\n=== ALL FRICTION NOTES ===\n`;
  for (const [qid, note] of Object.entries(state.frictions)) {
    const q = Q.find(x => x.id === qid);
    out += `  ${qid}: ${q ? q.text : '?'}\n    NOTE: ${note}\n`;
  }
  out += `\n=== ALL TYPED DETAILS ===\n`;
  for (const [qid, det] of Object.entries(state.typed_details)) {
    const q = Q.find(x => x.id === qid);
    out += `  ${qid}: ${q ? q.text : '?'}\n    DETAIL: ${det}\n`;
  }
  const fu = Q.filter(q => q.needs_followup && state.answers[q.id] === 'yes');
  if (fu.length) {
    out += `\n=== FIELDS NEEDING FOLLOW-UP VALUE PASS ===\n`;
    for (const q of fu) out += `  [#${q.field_id}] ${q.section}: ${q.text}\n`;
  }
  out += `\n--- END ---\n`;
  return out;
}

function copyDiagnostic() {
  const t = buildDiagnostic();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(t).then(showToast).catch(() => fallbackCopy(t));
  } else fallbackCopy(t);
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); showToast(); }
  catch(e) { alert('Could not copy — use inline report.'); }
  document.body.removeChild(ta);
}
function showToast() {
  const el = document.getElementById('toast'); el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}
function showInline() {
  document.getElementById('inlineDiag').innerHTML = `<div class="welcome-card"><h3>Full report (tap to select)</h3><textarea class="diag-box" readonly onclick="this.select()">${buildDiagnostic()}</textarea></div>`;
}

showWelcome();
</script>
</body>
</html>
