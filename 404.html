<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found — Xenia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #FAFAF7;
            --ink: #111111;
            --ink-soft: #555555;
            --ink-faint: #999999;
            --rule: #E5E5E0;
            --accent: #2D5A3D;
        }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter",
                         Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--ink);
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 56px 32px 48px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav.topnav {
            margin-bottom: 56px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--rule);
        }
        nav.topnav .wordmark {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--ink);
            text-decoration: none;
        }
        nav.topnav .pagelink {
            font-size: 13px;
            color: var(--ink-faint);
            text-decoration: none;
        }
        nav.topnav .pagelink:hover {
            color: var(--ink);
        }
        main { flex: 1; }
        main h1 {
            font-size: 36px;
            line-height: 1.15;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
            color: var(--ink);
        }
        main h2 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin: 40px 0 12px;
            color: var(--ink);
        }
        main h3 {
            font-size: 17px;
            font-weight: 600;
            margin: 28px 0 8px;
            color: var(--ink);
        }
        main h4 {
            font-size: 15px;
            font-weight: 600;
            margin: 20px 0 6px;
            color: var(--ink-soft);
        }
        main p { margin-bottom: 14px; color: var(--ink-soft); }
        main ul, main ol { margin: 0 0 16px 22px; color: var(--ink-soft); }
        main li { margin-bottom: 6px; }
        main a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(45,90,61,0.25); }
        main a:hover { border-bottom-color: var(--accent); }
        main code {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            font-size: 13px;
            background: #F0EFE9;
            padding: 1px 5px;
            border-radius: 3px;
        }
        main pre {
            background: #F0EFE9;
            padding: 14px 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 16px;
            font-size: 13px;
        }
        main blockquote {
            border-left: 3px solid var(--rule);
            padding-left: 16px;
            color: var(--ink-faint);
            font-style: italic;
            margin: 14px 0;
        }
        main table {
            border-collapse: collapse;
            width: 100%;
            margin: 14px 0 22px;
            font-size: 14px;
        }
        main th, main td {
            border: 1px solid var(--rule);
            padding: 8px 12px;
            text-align: left;
            vertical-align: top;
        }
        main th {
            background: #F0EFE9;
            font-weight: 600;
            color: var(--ink);
        }
        main hr {
            border: none;
            border-top: 1px solid var(--rule);
            margin: 32px 0;
        }
        main strong { color: var(--ink); }
        .page-meta {
            font-size: 13px;
            color: var(--ink-faint);
            margin-bottom: 32px;
        }
        footer {
            margin-top: 80px;
            padding-top: 28px;
            border-top: 1px solid var(--rule);
            font-size: 13px;
            color: var(--ink-faint);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 16px;
        }
        footer nav { display: flex; flex-wrap: wrap; gap: 18px; }
        footer a { color: var(--ink-faint); text-decoration: none; }
        footer a:hover { color: var(--ink); }
        @media (max-width: 600px) {
            .container { padding: 32px 22px; }
            main h1 { font-size: 28px; }
            main h2 { font-size: 19px; }
            main table { font-size: 13px; }
            footer { flex-direction: column; }
        }

        .nf-block { padding: 80px 0; text-align: center; }
        .nf-code { font-size: 64px; font-weight: 600; color: var(--ink-faint); letter-spacing: -0.03em; }
        .nf-msg { font-size: 18px; color: var(--ink-soft); margin: 12px 0 28px; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="topnav">
            <a class="wordmark" href="/">Xenia</a>
            <a class="pagelink" href="/">&larr; Home</a>
        </nav>
        <main>
            <div class="nf-block">
                <div class="nf-code">404</div>
                <div class="nf-msg">That page doesn't exist (yet).</div>
                <p><a href="/">Go to xeniadata.com home</a></p>
            </div>
        </main>
        <footer>
            <div>&copy; 2026 Xenia Data. All rights reserved.</div>
            <nav>
                <a href="/">Home</a>
                <a href="/methodology/">Methodology</a>
                <a href="/privacy/">Privacy</a>
                <a href="/terms/">Terms</a>
                <a href="/dmca/">DMCA</a>
                <a href="/crawler/">Crawler</a>
            </nav>
        </footer>
    </div>
</body>
</html>
